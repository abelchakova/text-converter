
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1.5rem 0; max-width: 680px; }
.title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.25rem; }
.subtitle { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
textarea { width: 100%; min-height: 120px; font-size: 16px; font-family: var(--font-sans); resize: vertical; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; background: var(--color-background-secondary); color: var(--color-text-primary); }
textarea:focus { outline: none; border-color: var(--color-border-primary); }
.mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.mode-btn { padding: 10px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s; }
.mode-btn:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }
.mode-btn.active { border: 1.5px solid #534AB7; background: #EEEDFE; color: #3C3489; }
.pair-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.pair-btn { padding: 7px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: 99px; background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s; }
.pair-btn:hover { color: var(--color-text-primary); }
.pair-btn.active { border-color: #0F6E56; background: #E1F5EE; color: #085041; }
.convert-btn { width: 100%; padding: 12px; background: #534AB7; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.convert-btn:hover { background: #3C3489; }
.convert-btn:active { transform: scale(0.98); }
.output-area { position: relative; }
.copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 10px; font-size: 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; }
.copy-btn:hover { color: var(--color-text-primary); }
.mode-desc { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 1rem; padding: 8px 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); border-left: 2px solid #534AB7; border-top-left-radius: 0; border-bottom-left-radius: 0; }
.shortcut-hint { font-size: 12px; color: var(--color-text-tertiary); text-align: center; margin-top: 0.5rem; }
kbd { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: 3px; padding: 1px 5px; font-size: 11px; font-family: var(--font-mono); }
</style>

<div class="app">
  <h2 class="sr-only">Keyboard and transliteration converter tool</h2>
  <p class="title">Text converter</p>
  <p class="subtitle">Fix wrong keyboard, fix caps, or transliterate between languages</p>

  <div class="card">
    <p class="label">Conversion mode</p>
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="keyboard" onclick="setMode('keyboard')">
        <i class="ti ti-keyboard" aria-hidden="true" style="font-size:18px;display:block;margin-bottom:4px"></i>
        Wrong keyboard
      </button>
      <button class="mode-btn" data-mode="caps" onclick="setMode('caps')">
        <i class="ti ti-letter-case" aria-hidden="true" style="font-size:18px;display:block;margin-bottom:4px"></i>
        Fix caps
      </button>
      <button class="mode-btn" data-mode="translit" onclick="setMode('translit')">
        <i class="ti ti-language" aria-hidden="true" style="font-size:18px;display:block;margin-bottom:4px"></i>
        Transliterate
      </button>
    </div>
    <p class="mode-desc" id="mode-desc">You typed with the wrong keyboard active. Select your language pair and convert.</p>

    <div id="pair-section">
      <p class="label">Language pair</p>
      <div class="pair-row" id="pair-row"></div>
    </div>
  </div>

  <div class="card">
    <p class="label">Input text</p>
    <textarea id="input" placeholder="Paste or type your text here‚Ä¶"></textarea>
  </div>

  <button class="convert-btn" onclick="convert()">
    <i class="ti ti-refresh" aria-hidden="true"></i> Convert text
  </button>
  <p class="shortcut-hint">Tip: <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to convert</p>

  <div class="card" style="margin-top:1rem">
    <p class="label">Result</p>
    <div class="output-area">
      <textarea id="output" readonly style="min-height:120px" placeholder="Your converted text will appear here‚Ä¶"></textarea>
      <button class="copy-btn" onclick="copyOut()"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
    </div>
  </div>
</div>

<script>
const MODES = {
  keyboard: {
    desc: "You typed with the wrong keyboard active. Select your language pair and convert.",
    pairs: ["EN‚ÜîUkrainian", "FR‚ÜîUkrainian", "EN‚ÜîFR"]
  },
  caps: {
    desc: "Fix text typed with Caps Lock on, or toggle between UPPER and lower case.",
    pairs: ["UPPER‚Üílower", "lower‚ÜíUPPER", "Title case", "Sentence case"]
  },
  translit: {
    desc: "Type phonetically in Latin letters and convert to the target alphabet.",
    pairs: ["Latin‚ÜíUkrainian", "Ukrainian‚ÜíLatin", "French accent fix"]
  }
};

const UK_EN_KB = {
  '–π':'q','—Ü':'w','—É':'e','–∫':'r','–µ':'t','–Ω':'y','–≥':'u','—à':'i','—â':'o','–∑':'p','—Ö':'[','—ó':']',
  '—Ñ':'a','—ñ':'s','–≤':'d','–∞':'f','–ø':'g','—Ä':'h','–æ':'j','–ª':'k','–¥':'l','–∂':';','—î':"'",
  '—è':'z','—á':'x','—Å':'c','–º':'v','–∏':'b','—Ç':'n','—å':'m',',':'<','.':'>',
  '–ô':'Q','–¶':'W','–£':'E','–ö':'R','–ï':'T','–ù':'Y','–ì':'U','–®':'I','–©':'O','–ó':'P','–•':'{','–á':'}',
  '–§':'A','–Ü':'S','–í':'D','–ê':'F','–ü':'G','–Ý':'H','–û':'J','–õ':'K','–î':'L','–ñ':':','–Ñ':'"',
  '–Ø':'Z','–ß':'X','–°':'C','–ú':'V','–ò':'B','–¢':'N','–¨':'M'
};
const EN_UK_KB = Object.fromEntries(Object.entries(UK_EN_KB).map(([k,v])=>[v,k]));

const FR_EN_KB = {
  'a':'q','z':'w','e':'e','r':'r','t':'t','y':'y','u':'u','i':'i','o':'o','p':'p',
  'q':'a','s':'s','d':'d','f':'f','g':'g','h':'h','j':'j','k':'k','l':'l','m':';',
  'w':'z','x':'x','c':'c','v':'v','b':'b','n':'n',',':'m',
  'A':'Q','Z':'W','E':'E','R':'R','T':'T','Y':'Y','U':'U','I':'I','O':'O','P':'P',
  'Q':'A','S':'S','D':'D','F':'F','G':'G','H':'H','J':'J','K':'K','L':'L','M':';',
  'W':'Z','X':'X','C':'C','V':'V','B':'B','N':'N'
};
const EN_FR_KB = Object.fromEntries(Object.entries(FR_EN_KB).map(([k,v])=>[v,k]));

const FR_UK_KB = {};
Object.entries(FR_EN_KB).forEach(([fr,en])=>{ if(EN_UK_KB[en]) FR_UK_KB[fr]=EN_UK_KB[en]; });
const UK_FR_KB = Object.fromEntries(Object.entries(FR_UK_KB).map(([k,v])=>[v,k]));

const TRANSLIT_TO_UK = [
  ['shch','—â'],['sch','—â'],['sh','—à'],['ch','—á'],['zh','–∂'],['kh','—Ö'],['ts','—Ü'],
  ['ya','—è'],['yu','—é'],['ye','—î'],['yi','—ó'],['yo','—å–æ'],['ia','—è'],['iu','—é'],['ie','—î'],
  ['a','–∞'],['b','–±'],['v','–≤'],['h','–≥'],['g','“ë'],['d','–¥'],['e','–µ'],['z','–∑'],
  ['y','–∏'],['i','—ñ'],['k','–∫'],['l','–ª'],['m','–º'],['n','–Ω'],['o','–æ'],['p','–ø'],
  ['r','—Ä'],['s','—Å'],['t','—Ç'],['u','—É'],['f','—Ñ'],['c','–∫'],['x','–∫—Å'],['q','–∫'],["'",'—å']
];

const CYRILLIC_TO_LATIN = {
  '–∞':'a','–±':'b','–≤':'v','–≥':'h','“ë':'g','–¥':'d','–µ':'e','—î':'ye','–∂':'zh','–∑':'z',
  '–∏':'y','—ñ':'i','—ó':'yi','–π':'i','–∫':'k','–ª':'l','–º':'m','–Ω':'n','–æ':'o','–ø':'p',
  '—Ä':'r','—Å':'s','—Ç':'t','—É':'u','—Ñ':'f','—Ö':'kh','—Ü':'ts','—á':'ch','—à':'sh',
  '—â':'shch','—å':"'",'—é':'yu','—è':'ya',
  '–ê':'A','–ë':'B','–í':'V','–ì':'H','“ê':'G','–î':'D','–ï':'E','–Ñ':'Ye','–ñ':'Zh','–ó':'Z',
  '–ò':'Y','–Ü':'I','–á':'Yi','–ô':'I','–ö':'K','–õ':'L','–ú':'M','–ù':'N','–û':'O','–ü':'P',
  '–Ý':'R','–°':'S','–¢':'T','–£':'U','–§':'F','–•':'Kh','–¶':'Ts','–ß':'Ch','–®':'Sh',
  '–©':'Shch','–¨':"'",'–Æ':'Yu','–Ø':'Ya'
};

const FR_ACCENT_PAIRS = [['/e','√©'],['/E','√â'],['//e','√®'],['/^e','√™'],['/^E','√ä'],['/^a','√¢'],['/^A','√Ç'],['/a','√Ý'],['/A','√Ä'],['/u','√π'],['/U','√ô'],['/c','√ß'],['/C','√á'],['/^u','√ª'],['/^i','√Æ'],['/^o','√¥']];

function mapChars(text, map) {
  return text.split('').map(c => map[c] || c).join('');
}

function translitToUk(text) {
  let out = '';
  let i = 0;
  const t = text.toLowerCase();
  while(i < t.length) {
    let matched = false;
    for(const [lat, cyr] of TRANSLIT_TO_UK) {
      if(t.startsWith(lat, i)) {
        const isUpper = text[i] === text[i].toUpperCase() && text[i] !== text[i].toLowerCase();
        out += isUpper ? cyr[0].toUpperCase() + cyr.slice(1) : cyr;
        i += lat.length;
        matched = true;
        break;
      }
    }
    if(!matched) { out += text[i]; i++; }
  }
  return out;
}

function cyrillicToLatin(text) {
  return text.split('').map(c => CYRILLIC_TO_LATIN[c] || c).join('');
}

function fixFrAccents(text) {
  let out = text;
  for(const [code, accent] of FR_ACCENT_PAIRS) {
    out = out.split(code).join(accent);
  }
  return out;
}

function fixCaps(text, mode) {
  if(mode === 'UPPER‚Üílower') return text.toLowerCase();
  if(mode === 'lower‚ÜíUPPER') return text.toUpperCase();
  if(mode === 'Title case') return text.split(' ').map(w=>w?w[0].toUpperCase()+w.slice(1).toLowerCase():w).join(' ');
  if(mode === 'Sentence case') return text.charAt(0).toUpperCase() + text.slice(1).toLowerCase();
  return text;
}

let currentMode = 'keyboard';
let currentPair = null;

function setMode(mode) {
  currentMode = mode;
  currentPair = null;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('mode-desc').textContent = MODES[mode].desc;
  renderPairs(mode);
}

function renderPairs(mode) {
  const row = document.getElementById('pair-row');
  row.innerHTML = '';
  MODES[mode].pairs.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'pair-btn' + (i === 0 ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => {
      currentPair = p;
      document.querySelectorAll('.pair-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    row.appendChild(btn);
  });
  currentPair = MODES[mode].pairs[0];
}

function convert() {
  const input = document.getElementById('input').value;
  if(!input.trim()) return;
  let result = input;

  if(currentMode === 'keyboard') {
    if(currentPair === 'EN‚ÜîUkrainian') result = mapChars(input, EN_UK_KB);
    else if(currentPair === 'FR‚ÜîUkrainian') result = mapChars(input, FR_UK_KB);
    else if(currentPair === 'EN‚ÜîFR') result = mapChars(input, EN_FR_KB);
  } else if(currentMode === 'caps') {
    result = fixCaps(input, currentPair);
  } else if(currentMode === 'translit') {
    if(currentPair === 'Latin‚ÜíUkrainian') result = translitToUk(input);
    else if(currentPair === 'Ukrainian‚ÜíLatin') result = cyrillicToLatin(input);
    else if(currentPair === 'French accent fix') result = fixFrAccents(input);
  }

  document.getElementById('output').value = result;
}

function copyOut() {
  const out = document.getElementById('output');
  out.select();
  document.execCommand('copy');
  const btn = document.querySelector('.copy-btn');
  btn.innerHTML = '<i class="ti ti-check"></i> Copied!';
  setTimeout(() => btn.innerHTML = '<i class="ti ti-copy"></i> Copy', 1500);
}

document.addEventListener('keydown', e => {
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); convert(); }
});

renderPairs('keyboard');
</script>
